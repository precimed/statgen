name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      testpypi_release_label:
        description: "TestPyPI release label (PEP 440 version). Leave empty to skip TestPyPI publish."
        required: false
        default: ""
        type: string

jobs:
  verify-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        id: vars
        run: |
          set -euo pipefail
          pyproject_version="$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('python/pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")"
          module_version="$(python -c "from pathlib import Path; namespace = {}; exec(Path('python/statgen/__init__.py').read_text(encoding='utf-8'), namespace); print(namespace['__version__'])")"

          if [ "$pyproject_version" != "$module_version" ]; then
            echo "python/pyproject.toml version $pyproject_version does not match python/statgen/__init__.py version $module_version" >&2
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$pyproject_version" ]; then
              echo "Tag version $tag_version does not match package version $pyproject_version" >&2
              exit 1
            fi
            release_version="$tag_version"
          elif [ -n "${{ inputs.testpypi_release_label }}" ]; then
            release_version="${{ inputs.testpypi_release_label }}"
          else
            release_version="manual"
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"

  test:
    name: Test Release Build
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Octave
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends octave

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e python/
          pip install pytest

      - name: Run test suite
        run: pytest tests

  build-python-artifacts:
    name: Build Python Artifacts
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine packaging setuptools wheel

      - name: Override package version for manual TestPyPI publish
        if: github.event_name == 'workflow_dispatch' && inputs.testpypi_release_label != ''
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import tomllib
          from packaging.version import Version

          manual_version = "${{ inputs.testpypi_release_label }}"
          Version(manual_version)

          pyproject_path = pathlib.Path("python/pyproject.toml")
          pyproject_text = pyproject_path.read_text(encoding="utf-8")
          current_version = tomllib.loads(pyproject_text)["project"]["version"]
          updated_pyproject_text = pyproject_text.replace(
              f'version = "{current_version}"',
              f'version = "{manual_version}"',
              1,
          )
          if updated_pyproject_text == pyproject_text:
              raise SystemExit("failed to update python/pyproject.toml version")
          pyproject_path.write_text(updated_pyproject_text, encoding="utf-8")

          version_path = pathlib.Path("python/statgen/__init__.py")
          version_text = version_path.read_text(encoding="utf-8")
          updated_version_text = version_text.replace(
              f'__version__ = "{current_version}"',
              f'__version__ = "{manual_version}"',
              1,
          )
          if updated_version_text == version_text:
              raise SystemExit("failed to update python/statgen/__init__.py version")
          version_path.write_text(updated_version_text, encoding="utf-8")
          PY

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          rm -rf python/build python/dist python/statgen.egg-info
          python -P -m build --no-isolation python/

      - name: Check built artifacts
        run: python -m twine check python/dist/*

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*

  build-matlab-artifact:
    name: Build MATLAB Release Artifact
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package matlab folder
        run: |
          set -euo pipefail
          version="${{ needs.verify-version.outputs.version }}"
          mkdir -p release
          zip -r "release/statgen-matlab-${version}.zip" matlab

      - name: Upload MATLAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: matlab-release
          path: release/*.zip

  publish-pypi:
    name: Publish PyPI Package
    needs:
      - verify-version
      - build-python-artifacts
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    name: Publish TestPyPI Package
    needs:
      - verify-version
      - build-python-artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.testpypi_release_label != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - verify-version
      - build-python-artifacts
      - build-matlab-artifact
      - publish-pypi
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets

      - name: Download MATLAB artifact
        uses: actions/download-artifact@v4
        with:
          name: matlab-release
          path: release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            release-assets/*
